<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulting at Studio b. has moved to Markdown</title>
  <link rel="canonical" href="https://markdown.b.studio/">
  <meta http-equiv="refresh" content="1; url=https://markdown.b.studio/">
  <meta name="robots" content="noindex">
  <script>
    setTimeout(function () {
      window.location.replace('https://markdown.b.studio' + window.location.pathname + window.location.search + window.location.hash);
    }, 900);
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --ink: #0D0D0D;
      --yolk: #F7D344;
      --vermillion: #D94425;
      --yolk-text: rgba(247, 211, 68, 0.72);
      --yolk-dim: rgba(247, 211, 68, 0.4);
    }
    html, body { min-height: 100vh; }
    body {
      background: var(--ink);
      color: var(--yolk-text);
      font-family: 'IBM Plex Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(-45deg, transparent 0, transparent 22px, rgba(247,211,68,0.025) 22px, rgba(247,211,68,0.025) 23px);
      pointer-events: none;
      z-index: 0;
    }
    .stripe {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: repeating-linear-gradient(-45deg, var(--yolk) 0, var(--yolk) 6px, var(--ink) 6px, var(--ink) 12px);
      z-index: 2;
    }
    .card {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
    }
    .bmark {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 3.5rem;
      color: var(--yolk);
      letter-spacing: -0.04em;
      line-height: 1;
      display: inline-block;
      margin-bottom: 2.5rem;
    }
    .bmark .dot { color: var(--vermillion); }
    .kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--yolk-dim);
      margin-bottom: 1.25rem;
    }
    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: clamp(1.6rem, 3.5vw, 2.2rem);
      color: var(--yolk);
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 1.5rem;
    }
    h1 .dot { color: var(--vermillion); }
    p {
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 1rem;
      color: var(--yolk-text);
      max-width: 50ch;
    }
    a {
      color: var(--vermillion);
      text-decoration: none;
      border-bottom: 1px solid rgba(217, 68, 37, 0.4);
      transition: border-color 0.12s;
    }
    a:hover { border-bottom-color: var(--vermillion); }
    .inline-b { color: var(--yolk); }
    .inline-b .dot { color: var(--vermillion); }
    .fallback {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--yolk-dim);
      margin-top: 2rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
<div class="stripe"></div>
<div class="card">
  <span class="bmark">b<span class="dot">.</span></span>
  <p class="kicker">// Consulting moved</p>
  <h1>Consulting now lives inside Markdown<span class="dot">.</span></h1>
  <p>Consulting at Studio <span class="inline-b">b<span class="dot">.</span></span> now lives inside <a href="https://markdown.b.studio/">Markdown</a> &mdash; the operator newsletter where the work gets written down. Same writer, broader scope.</p>
  <p class="fallback">Redirecting to <a href="https://markdown.b.studio/">markdown.b.studio</a>&hellip;</p>
</div>
</body>
</html>
